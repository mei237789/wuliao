        // ---------- 随机选择音乐并设置到播放器 ----------
        function setRandomMusic() {
            if (musicLibrary.length === 0) {
                // 没有音乐时隐藏播放器或显示提示
                document.querySelector('.music-box').innerHTML = '<p style="color: #999;">📭 音乐库为空，请添加音乐文件</p >';

            }
            const randomIndex = Math.floor(Math.random() * musicLibrary.length);
            const selectedMusic = musicLibrary[randomIndex];
            const audio = document.getElementById('bgMusic');
            
            // 设置音频源（浏览器会自动预加载）
            audio.src = selectedMusic;
            
            // 由于 src 改变，浏览器会重置播放状态，不会自动播放
            // 我们保留 controls，用户可手动点击播放
            
            console.log('本次随机音乐：', selectedMusic);
        }

        // ---------- 页面加载时执行随机 ----------
        window.addEventListener('load', () => {
            displayRandomText();
            setRandomMusic();
        });

        // ---------- 可选：轻触页面任意处尝试播放音乐（辅助体验，非必须）----------
        (function enableQuickPlay() {
            const music = document.getElementById('bgMusic');
            const handler = function firstInteraction() {
                // 如果音乐已经设置了 src 且处于暂停状态，尝试播放
                if (music.src && music.paused) {
                    music.play().catch(e => {
                        // 自动播放失败是正常的，用户会手动点击播放按钮
                        console.log('自动播放失败，用户可手动点击播放', e);
                    });
                }
                document.body.removeEventListener('touchstart', handler);
                document.body.removeEventListener('click', handler);
            };
            document.body.addEventListener('touchstart', handler);
            document.body.addEventListener('click', handler);
        })();
